<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F9FA" />

    <!-- Favicons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/novofix-logo.svg" />
    <link rel="apple-touch-icon" href="/novofix-logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Default SEO (overridden at runtime by react-helmet-async per route) -->
    <title>NovoFix · Profesionales de confianza para tu hogar y comercio</title>
    <meta name="description" content="NovoFix conecta clientes con profesionales verificados de servicios para el hogar y comercio. Encuentra plomeros, electricistas, pintores y más, cerca de ti." />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph defaults (overridden per route) -->
    <meta property="og:site_name" content="NovoFix" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NovoFix · Profesionales de confianza" />
    <meta property="og:description" content="Encuentra profesionales verificados para tu hogar y comercio." />
    <meta property="og:image" content="/og-default.jpg" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NovoFix" />
    <meta name="twitter:description" content="Profesionales verificados a un mensaje de distancia." />
    <meta name="twitter:image" content="/og-default.jpg" />

    <!-- Performance: preconnect / dns-prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <!-- Cloudinary sirve TODOS los reels e imágenes de portafolio en la Home.
         preconnect (vs dns-prefetch) hace TLS+TCP por adelantado, ahorrando
         100-300ms en la primera petición de imagen/video. crossorigin es
         requerido porque los <img>/<video> de Cloudinary se sirven sin
         credenciales (modo CORS anónimo). -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="https://res.cloudinary.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-white text-body font-sans">
    <div id="root"></div>
    <!-- Audio para notificaciones de chat (servido como archivo estático para no inflar el HTML) -->
    <audio id="notification-sound" preload="none">
      <source src="/sounds/notification.wav" type="audio/wav" />
    </audio>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
